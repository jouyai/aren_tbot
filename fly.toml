# Fly.io configuration for Telegram Bot PPOB/SMM Reseller
app = "aren-tbot"
primary_region = "sin"  # Singapore — paling dekat dari Indonesia

[build]
  # Fly.io akan detect Python otomatis via Dockerfile atau nixpacks

[env]
  LOG_LEVEL = "INFO"

# Bot ini adalah worker (tidak perlu HTTP port publik untuk polling mode)
# Tapi kita tetap expose port 8000 untuk webhook Pakasir
[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[processes]
  worker = "python -m bot.main"
